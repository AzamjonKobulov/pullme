<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="./css/styles.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- MAIN -->
    <main class="relative">
      <div class="fixed inset-0 size-full z-[60] bg-white/80 overflow-y-auto">
        <div
          class="max-w-3xl sm:max-w-4xl lg:max-w-6xl w-full mx-auto relative space-y-24 pt-24 pb-10 px-2.5"
        >
          <!-- Texts & Image -->
          <div
            class="flex flex-col-reverse lg:flex-row lg:items-center lg:justify-between gap-10"
          >
            <!-- Texts -->
            <div class="space-y-10 lg:space-y-28">
              <!-- Title -->
              <h1
                class="text-[54px] sm:text-[72px] lg:text-[120px] text-trsprt-section-title leading-[100%]"
              >
                Ваш платеж <br />
                успешно <br />
                выполнен!
              </h1>

              <!-- Infos -->
              <div
                class="sm:max-w-[550px] w-full font-oswald font-bold sm:text-[22px]"
              >
                <!-- Info 1 -->
                <div class="flex items-center justify-between">
                  <div class="text-black/40">Ваш номер заказа:</div>
                  <div class="text-black/65">#3694</div>
                </div>
                <!-- Info 2 -->
                <div class="flex items-center justify-between">
                  <div class="text-black/40">Сумма:</div>
                  <div class="text-black/65">6080 RUB</div>
                </div>
                <!-- Info 3 -->
                <div class="flex items-center justify-between">
                  <div class="text-black/40">Статус:</div>
                  <div class="text-black/65">Оплата успешно завершена</div>
                </div>
                <!-- Info 4 -->
                <div class="flex items-center justify-between">
                  <div class="text-black/40">Дата платежа:</div>
                  <div class="text-black/65">08 декабря 2024, 14:30</div>
                </div>
              </div>
            </div>

            <!-- Image -->
            <img
              src="./assets/images/payment-success.png"
              alt="Payment Success"
              class="w-[174px] h-[200px] sm:w-60 sm:h-80 xl:size-auto mx-auto xl:mx-0"
            />
          </div>

          <!-- Buttons -->
          <div
            class="lg:max-w-[900px] mx-auto flex flex-col sm:flex-row sm:items-center gap-3.5 sm:gap-7 lg:gap-10"
          >
            <a
              href="./index.html"
              class="block w-full sm:h-[74px] relative mx-auto font-mulish font-extrabold uppercase text-white text-[17.5px] leading-6 border-2 sm:border-none border-brand-purple hover:shadow-lg transition-all duration-200 rounded-30 overflow-hidden px-8"
            >
              <img
                src="./assets/bg-images/button.png"
                alt="button"
                class="absolute inset-0 size-full object-cover"
              />
              <div
                class="relative flex flex-col items-center justify-center lg:text-[26px] uppercase text-center z-10 py-4"
              >
                Вернуться <br class="hidden sm:block" />
                на главную
              </div>
            </a>
            <a
              href="#"
              class="block w-full sm:h-[74px] relative mx-auto font-mulish font-extrabold uppercase text-white text-[17.5px] leading-6 border-2 sm:border-none border-brand-purple hover:shadow-lg transition-all duration-200 rounded-30 overflow-hidden px-8"
            >
              <img
                src="./assets/bg-images/button.png"
                alt="button"
                class="absolute inset-0 size-full object-cover"
              />
              <div
                class="relative flex flex-col items-center justify-center lg:text-[26px] uppercase text-center z-10 py-4"
              >
                Посмотреть <br class="hidden sm:block" />
                заказ
              </div>
            </a>
            <a
              href="#"
              class="block w-full sm:h-[74px] relative mx-auto font-mulish font-extrabold uppercase text-white text-[17.5px] leading-6 border-2 sm:border-none border-brand-purple hover:shadow-lg transition-all duration-200 rounded-30 overflow-hidden px-8"
            >
              <img
                src="./assets/bg-images/button.png"
                alt="button"
                class="absolute inset-0 size-full object-cover"
              />
              <div
                class="relative flex flex-col items-center justify-center lg:text-[26px] uppercase text-center z-10 py-4"
              >
                Продолжить <br class="hidden sm:block" />
                покупки
              </div>
            </a>
          </div>
        </div>
      </div>
    </main>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
